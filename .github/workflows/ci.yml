name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate:
    name: Validate Extension
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Validate manifest.json
        run: |
          node -e "
            const m = require('./manifest.json');
            if (m.manifest_version !== 3) { console.error('Must be Manifest V3'); process.exit(1); }
            if (!m.version) { console.error('Missing version'); process.exit(1); }
            const icons = Object.keys(m.icons || {});
            ['16','48','128'].forEach(s => {
              if (!icons.includes(s)) { console.error('Missing icon size: ' + s); process.exit(1); }
            });
            console.log('manifest.json valid — v' + m.version);
          "

      - name: Check source files parse correctly
        run: |
          for f in src/**/*.js src/*.js; do
            [ -f "$f" ] && node --check "$f" && echo "OK: $f"
          done

      - name: Install Playwright
        run: npx playwright install chromium --with-deps

      - name: Run extension tests (non-AEM)
        run: npx playwright test --grep-invert "integration|AEM API|Sling|JCR|Content Fragment|Ghostwriter|Environment Diff"
        env:
          CI: true

  build:
    name: Build Extension Package
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Package extension
        run: npm run build

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: aem-agent-extension-${{ github.sha }}
          path: aem-agent-extension.zip
          retention-days: 30
