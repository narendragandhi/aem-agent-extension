<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AEM Agent</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f5f5f5;
    }
    .header {
      background: linear-gradient(135deg, #d52b1e 0%, #9e1b1e 100%);
      color: white;
      padding: 16px;
      text-align: center;
    }
    .header h1 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .header p {
      font-size: 11px;
      opacity: 0.8;
    }
    .page-info {
      background: white;
      padding: 12px;
      border-bottom: 1px solid #e0e0e0;
    }
    .page-info .path {
      font-size: 12px;
      font-weight: 500;
      color: #333;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .page-info .meta {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
      display: flex;
      gap: 8px;
    }
    .actions {
      padding: 8px;
    }
    .action-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 10px 12px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 6px;
      margin-bottom: 6px;
      cursor: pointer;
      font-size: 13px;
      color: #333;
      transition: all 0.2s;
    }
    .action-btn:hover {
      border-color: #d52b1e;
      background: #fff8f8;
    }
    .action-btn .icon {
      font-size: 16px;
    }
    .quick-tools {
      padding: 8px;
      border-top: 1px solid #e0e0e0;
    }
    .quick-tools-title {
      font-size: 10px;
      text-transform: uppercase;
      color: #666;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .tool-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
    }
    .tool-btn {
      padding: 8px;
      background: white;
      border: 1px solid #e0e0e0;
      border-radius: 4px;
      font-size: 11px;
      cursor: pointer;
      text-align: center;
    }
    .tool-btn:hover {
      border-color: #d52b1e;
    }
    .status {
      padding: 12px;
      text-align: center;
      font-size: 11px;
      color: #666;
      border-top: 1px solid #e0e0e0;
    }
    .status.online {
      color: #4caf50;
    }
    .status.offline {
      color: #f44336;
    }
  </style>
</head>
<body>
  <div class="header">
    <h1>AEM Agent</h1>
    <p>AI-powered AEM assistant</p>
  </div>

  <div class="page-info" id="pageInfo">
    <div class="path" id="pagePath">No AEM page detected</div>
    <div class="meta" id="pageMeta"></div>
  </div>

  <div class="actions">
    <button class="action-btn" id="openSidePanel">
      <span class="icon">🔧</span>
      Open Agent Panel
    </button>
    <button class="action-btn" id="openCxforge">
      <span class="icon">🔗</span>
      Open CXForge
    </button>
    <button class="action-btn" id="refreshContext">
      <span class="icon">🔄</span>
      Refresh Page Info
    </button>
  </div>

  <div class="quick-tools">
    <div class="quick-tools-title">Quick Tools</div>
    <div class="tool-grid">
      <button class="tool-btn" data-tool="content-health">Content Health</button>
      <button class="tool-btn" data-tool="bulk-tag">Bulk Tag</button>
      <button class="tool-btn" data-tool="asset-report">Asset Report</button>
      <button class="tool-btn" data-tool="page-properties">Page Properties</button>
    </div>
  </div>

  <div class="status" id="status">
    Checking connection...
  </div>

  <script src="popup.js"></script>
</body>
</html>
